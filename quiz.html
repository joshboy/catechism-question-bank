<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Catechism Quiz — Lesson 8: Jesus Who Died For Us</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#8B1A1A">

<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Catechism">
<meta name="mobile-web-app-capable" content="yes">
<style>
  :root {
    --primary: #8B1A1A;
    --secondary: #2C5282;
    --accent: #D69E2E;
    --bg: #FAF7F0;
    --card: #FFFFFF;
    --text: #2D3748;
    --muted: #718096;
    --good: #2F855A;
    --bad: #C53030;
    --warn: #B7791F;
    --border: #E2E8F0;
  }
  * { box-sizing: border-box; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header {
    background: linear-gradient(135deg, var(--primary), #6B0F0F);
    color: white;
    padding: calc(24px + env(safe-area-inset-top, 0px)) 20px 24px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  header h1 { margin: 0 0 6px; font-size: 24px; }
  header p { margin: 0; opacity: 0.9; font-size: 14px; }
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }
  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    border: 1px solid var(--border);
  }
  .intro h2 { color: var(--primary); margin-top: 0; }
  .intro ul { padding-left: 22px; }
  button {
    background: var(--primary);
    color: white;
    border: none;
    padding: 12px 24px;
    font-size: 16px;
    font-family: inherit;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.15s;
  }
  button:hover { background: #6B0F0F; }
  button.secondary { background: var(--secondary); }
  button.secondary:hover { background: #1F3A60; }
  button:disabled { background: #999; cursor: not-allowed; }
  .question {
    border-left: 5px solid var(--primary);
    padding: 16px 18px;
    margin-bottom: 18px;
    background: #FDFCF7;
    border-radius: 0 8px 8px 0;
  }
  .q-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .q-number { font-weight: bold; color: var(--primary); }
  .q-marks {
    background: var(--accent);
    color: white;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: bold;
  }
  .q-text { font-size: 16px; margin-bottom: 10px; }
  textarea {
    width: 100%;
    min-height: 70px;
    padding: 10px;
    font-family: inherit;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 6px;
    resize: vertical;
  }
  textarea:focus { outline: 2px solid var(--secondary); border-color: var(--secondary); }
  textarea.three-mark { min-height: 130px; }
  textarea.two-mark { min-height: 90px; }
  .score-summary {
    text-align: center;
    padding: 20px;
    background: linear-gradient(135deg, #FFF8E1, #FFFCF0);
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .score-summary .big {
    font-size: 42px;
    font-weight: bold;
    color: var(--primary);
    margin: 8px 0;
  }
  .result-question { border-left-color: var(--muted); }
  .result-question.good { border-left-color: var(--good); }
  .result-question.partial { border-left-color: var(--warn); }
  .result-question.bad { border-left-color: var(--bad); }
  .result-block {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 14px;
  }
  .your-answer { background: #F7FAFC; border: 1px solid var(--border); }
  .model-answer { background: #E6FFFA; border: 1px solid #B2F5EA; margin-top: 8px; }
  .keywords { margin-top: 8px; font-size: 13px; }
  .kw {
    display: inline-block;
    padding: 2px 8px;
    margin: 2px 4px 2px 0;
    border-radius: 10px;
    font-size: 12px;
  }
  .kw.hit { background: #C6F6D5; color: #22543D; }
  .kw.miss { background: #FED7D7; color: #742A2A; }
  .verdict {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: bold;
  }
  .verdict.good { background: #C6F6D5; color: #22543D; }
  .verdict.partial { background: #FEEBC8; color: #7B341E; }
  .verdict.bad { background: #FED7D7; color: #742A2A; }
  .actions { text-align: center; margin-top: 20px; }
  .actions button { margin: 0 6px; }
  label.small { font-size: 13px; color: var(--muted); display: block; margin-bottom: 4px; }

  /* Year / Category / Chapter selection screens */
  .nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .back-link, .home-link {
    color: var(--secondary);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    padding: 4px 0;
    font-weight: bold;
  }
  .back-link:hover, .home-link:hover { text-decoration: underline; background: none; }
  .home-link { color: var(--muted); }
  .home-link:hover { color: var(--primary); }
  .breadcrumb {
    color: var(--muted);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .year-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
    gap: 10px;
    margin-top: 16px;
  }
  .year-btn {
    background: var(--card);
    color: var(--primary);
    border: 2px solid var(--primary);
    padding: 18px 8px;
    font-family: inherit;
    font-size: 16px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .year-btn:hover { background: var(--primary); color: white; }
  .year-btn .year-num { display: block; font-size: 22px; }
  .year-btn .year-label { display: block; font-size: 11px; font-weight: normal; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin-top: 16px;
  }
  .category-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    transition: all 0.15s;
  }
  .category-card:hover:not(.disabled) {
    border-color: var(--primary);
    box-shadow: 0 4px 10px rgba(139,26,26,0.12);
    transform: translateY(-2px);
  }
  .category-card h3 { margin: 0 0 6px; color: var(--primary); font-size: 18px; }
  .category-card p { margin: 0; color: var(--muted); font-size: 13px; }
  .category-card.disabled {
    opacity: 0.55;
    cursor: not-allowed;
    background: #F7FAFC;
  }
  .category-card .badge {
    display: inline-block;
    background: var(--muted);
    color: white;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .category-card .badge.soon { background: var(--accent); }
  .category-card .badge.locked { background: #A0AEC0; }

  .chapter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 10px;
    margin-top: 16px;
  }
  .chapter-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 14px 10px;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    transition: all 0.15s;
  }
  .chapter-btn:not(.disabled):hover {
    border-color: var(--primary);
    background: #FDFCF7;
  }
  .chapter-btn .ch-num { display: block; font-weight: bold; color: var(--primary); font-size: 16px; }
  .chapter-btn .ch-title { display: block; font-size: 12px; color: var(--text); margin-top: 4px; min-height: 2.4em; }
  .chapter-btn.disabled {
    opacity: 0.45;
    cursor: not-allowed;
    background: #F7FAFC;
  }
  .chapter-btn.disabled .ch-num { color: var(--muted); }

  /* Prayers screen */
  .prayer-section { margin-top: 14px; }
  .prayer-section-header {
    width: 100%;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    cursor: pointer;
    font-family: inherit;
    font-size: 16px;
    font-weight: bold;
    color: var(--primary);
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.15s;
  }
  .prayer-section-header:hover {
    border-color: var(--primary);
    background: #FDFCF7;
  }
  .prayer-section-header.action {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .prayer-section-header.action:hover {
    background: #6B0F0F;
  }
  .prayer-section-header .caret {
    font-size: 14px;
    color: var(--muted);
  }
  .prayer-section-header.action .caret-info {
    font-size: 12px;
    font-weight: normal;
    opacity: 0.85;
  }
  .prayer-list-container {
    margin-top: 10px;
    padding-left: 6px;
    border-left: 3px solid var(--accent);
  }
  .prayer-item {
    margin: 6px 0;
  }
  .prayer-item-header {
    width: 100%;
    background: #FDFCF7;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.15s;
  }
  .prayer-item-header:hover {
    border-color: var(--primary);
    background: #FFF8E1;
  }
  .prayer-item-header .caret {
    font-size: 13px;
    color: var(--secondary);
  }
  .prayer-item-text {
    background: #FFFCF0;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 14px 16px;
    margin-top: -2px;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  /* Exit button */
  .exit-row {
    margin-top: 28px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    text-align: center;
  }
  .exit-btn {
    background: none;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 10px 20px;
    font-family: inherit;
    font-size: 14px;
    border-radius: 8px;
    cursor: pointer;
  }
  .exit-btn:hover {
    color: var(--bad);
    border-color: var(--bad);
  }

  .hidden { display: none; }
</style>
</head>
<body>
<header>
  <h1>Catechism Quiz</h1>
  <p id="header-subtitle">Pick your year group to begin</p>
</header>
<main>

<div id="start-screen" class="card">
  <div class="breadcrumb">Step 1 of 2</div>
  <h2 style="color:var(--primary); margin-top:0;">Choose your Year Group</h2>
  <p style="color:var(--muted); font-size:14px;">Tap your school year to see what's available.</p>
  <div class="year-grid" id="year-grid"></div>
  <div class="exit-row">
    <button class="exit-btn" onclick="exitApp()">Exit App</button>
  </div>
</div>

<div id="category-screen" class="hidden card">
  <div class="nav-bar">
    <button class="back-link" onclick="goToYearScreen()">&larr; Change Year</button>
    <button class="home-link" onclick="goHome()">&#8962; Home</button>
  </div>
  <div class="breadcrumb" id="category-breadcrumb">Step 2 of 2</div>
  <h2 style="color:var(--primary); margin-top:0;">Choose a Category</h2>
  <div class="category-grid" id="category-grid"></div>
</div>

<div id="chapter-screen" class="hidden card">
  <div class="nav-bar">
    <button class="back-link" onclick="goToCategoryScreen()">&larr; Categories</button>
    <button class="home-link" onclick="goHome()">&#8962; Home</button>
  </div>
  <div class="breadcrumb" id="chapter-breadcrumb">Step 3 of 3</div>
  <h2 style="color:var(--primary); margin-top:0;">Choose a Chapter</h2>
  <p style="color:var(--muted); font-size:14px;">Chapters that don't yet have questions are greyed out — we'll add them over time.</p>
  <div class="chapter-grid" id="chapter-grid"></div>
</div>

<div id="prayers-screen" class="hidden card">
  <div class="nav-bar">
    <button class="back-link" onclick="goToCategoryScreen()">&larr; Categories</button>
    <button class="home-link" onclick="goHome()">&#8962; Home</button>
  </div>
  <div class="breadcrumb" id="prayers-breadcrumb">Prayers</div>
  <h2 style="color:var(--primary); margin-top:0;">Prayers</h2>

  <div class="prayer-section">
    <button class="prayer-section-header" id="prayer-list-toggle" onclick="togglePrayerList()">
      <span>List of Prayers</span>
      <span class="caret">&#9656;</span>
    </button>
    <div class="prayer-list-container hidden" id="prayer-list-container"></div>
  </div>

  <div class="prayer-section">
    <button class="prayer-section-header action" onclick="startPrayersMockTest()">
      <span>Prayers Mock Test</span>
      <span class="caret-info" id="mock-info">3 random × 3 marks each</span>
    </button>
  </div>
</div>

<div id="quiz-screen" class="hidden"></div>
<div id="result-screen" class="hidden"></div>

</main>

<script>
// ===== QUESTION BANK =====
// Each question has:
//  q: the question text
//  model: a sample answer
//  keywords: arrays of accepted terms. Each inner array = ONE concept;
//            answer must contain at least one term from each inner array to fully cover.

const QUESTION_BANK = {
  one: [
    {
      q: "Where did Jesus go to pray before his sacrifice?",
      model: "Jesus went to the Mount of Olives to pray.",
      keywords: [["mount of olives", "olives"]]
    },
    {
      q: "Who betrayed Jesus with a kiss?",
      model: "Judas, one of the twelve disciples, betrayed Jesus with a kiss.",
      keywords: [["judas"]]
    },
    {
      q: "How many times did Peter deny Jesus?",
      model: "Peter denied Jesus three times.",
      keywords: [["three", "3", "thrice"]]
    },
    {
      q: "Who was made to carry the cross behind Jesus?",
      model: "Simeon of Cyrene was made to carry the cross behind Jesus.",
      keywords: [["simeon", "cyrene"]]
    },
    {
      q: "What is the name of the place where Jesus was crucified?",
      model: "Jesus was crucified at Golgotha (also called Calvary).",
      keywords: [["golgotha", "calvary"]]
    },
    {
      q: "Who washed his hands saying 'I am innocent of this man's blood'?",
      model: "Pilate washed his hands in front of the people.",
      keywords: [["pilate"]]
    },
    {
      q: "Whom did Pilate set free instead of Jesus?",
      model: "Pilate set free Barabas instead of Jesus.",
      keywords: [["barabas", "barabbas"]]
    },
    {
      q: "What did the soldiers twist and put on Jesus' head?",
      model: "The soldiers twisted thorns into a crown and put it on his head.",
      keywords: [["thorns", "crown of thorns", "crown"]]
    },
    {
      q: "What colour robe did the soldiers put on Jesus when they mocked him?",
      model: "They put a scarlet robe on him.",
      keywords: [["scarlet"]]
    },
    {
      q: "Which day of the holy week commemorates the passion and crucifixion of Jesus?",
      model: "Good Friday commemorates the passion and crucifixion of Jesus.",
      keywords: [["good friday", "friday"]]
    },
    {
      q: "At about what hour did Jesus breathe his last on the cross?",
      model: "Jesus breathed his last about the ninth hour.",
      keywords: [["ninth", "9th", "9"]]
    },
    {
      q: "What in the temple was torn into two from top to bottom when Jesus died?",
      model: "The curtain of the temple was torn into two from top to bottom.",
      keywords: [["curtain", "veil"]]
    },
    {
      q: "Who appeared from heaven to strengthen Jesus while he prayed?",
      model: "An angel appeared from heaven to strengthen him.",
      keywords: [["angel"]]
    },
    {
      q: "Into how many parts did the soldiers divide Jesus' clothes?",
      model: "The soldiers divided his clothes into four parts, one for each soldier.",
      keywords: [["four", "4"]]
    },
    {
      q: "What signal did Judas use to betray Jesus?",
      model: "Judas used a kiss as the pre-arranged signal of betrayal.",
      keywords: [["kiss"]]
    },
    {
      q: "From which Gospel chapter does the verse 'For God so loved the world...' come?",
      model: "It is from John 3:16.",
      keywords: [["john", "jn"], ["3", "3:16"]]
    },
    {
      q: "Who did the centurion say Jesus was, after watching him die?",
      model: "The centurion praised God and said, 'Truly this man was innocent.'",
      keywords: [["innocent"]]
    }
  ],

  two: [
    {
      q: "What did Jesus pray at the Mount of Olives? (Quote or paraphrase the prayer.)",
      model: "Jesus prayed, 'Father, if you are willing, remove this cup from me; yet, not my will but yours be done.' (Luke 22:42)",
      keywords: [
        ["father"],
        ["cup"],
        ["will"],
        ["yours", "your", "thy"]
      ]
    },
    {
      q: "What three accusations did they bring against Jesus before Pilate?",
      model: "They accused him of (1) perverting the nation, (2) forbidding to pay taxes to the emperor, and (3) saying that he himself is the Messiah, a king.",
      keywords: [
        ["perverting", "nation"],
        ["tax", "taxes", "emperor"],
        ["messiah", "king"]
      ]
    },
    {
      q: "What did Jesus say to the women who wept for him on the way to Calvary?",
      model: "He said, 'Daughters of Jerusalem, do not weep for me, but weep for yourselves and for your children.' (Luke 23:28)",
      keywords: [
        ["daughters", "jerusalem"],
        ["weep", "cry"],
        ["yourselves", "yourself", "children"]
      ]
    },
    {
      q: "What were Jesus' last words on the cross before he breathed his last?",
      model: "Jesus said, 'Father, into your hands I commend my spirit.' (Luke 23:46)",
      keywords: [
        ["father"],
        ["hands"],
        ["commend", "commit"],
        ["spirit"]
      ]
    },
    {
      q: "Name any four ceremonies that form part of the Good Friday observances.",
      model: "Reading of the passion narrative, veneration of the cross, drinking the bitter juice, the way of the cross, and procession of penance.",
      keywords: [
        ["passion", "narrative", "reading"],
        ["veneration", "cross"],
        ["bitter", "juice"],
        ["way of the cross", "procession", "penance"]
      ]
    },
    {
      q: "What signs in nature happened at the moment Jesus died?",
      model: "The curtain of the temple was torn from top to bottom, the sun darkened, the earth shook and the rocks split.",
      keywords: [
        ["curtain", "veil", "temple"],
        ["sun", "darkened", "darkness"],
        ["earth", "shook", "earthquake"],
        ["rocks", "split"]
      ]
    },
    {
      q: "How did the centurion react after seeing Jesus die, and what did he say?",
      model: "The centurion who was watching all this praised God and said, 'Truly this man was innocent.'",
      keywords: [
        ["centurion"],
        ["praised", "glorified"],
        ["innocent"]
      ]
    },
    {
      q: "What did Jesus tell his disciples when he reached the Mount of Olives?",
      model: "He said to them, 'Pray that you may not enter into temptation.'",
      keywords: [
        ["pray"],
        ["temptation"]
      ]
    },
    {
      q: "What was the prayer of Jesus at Gethsemane?",
      model: "At Gethsemane, Jesus knelt down and prayed, 'Father, if you are willing, remove this cup from me; yet, not my will but yours be done.' (Luke 22:42)",
      keywords: [
        ["father"],
        ["cup"],
        ["will"],
        ["yours", "your", "thy"]
      ]
    },
    {
      q: "What was the answer given by the Father in response to Jesus' prayer at Gethsemane?",
      model: "The Father decided not to remove the cup but to give him more strength to accept the suffering. An angel appeared from heaven to strengthen Jesus.",
      keywords: [
        ["not remove", "did not remove", "didn t remove", "not removed", "decided not"],
        ["cup"],
        ["strength", "strengthen", "strengthened", "stronger"],
        ["suffering", "accept", "endure", "bear"]
      ]
    },
    {
      q: "What did Jesus ask Judas who came to betray him?",
      model: "Jesus asked, 'Judas, is it with a kiss that you are betraying the Son of Man?' (Luke 22:48)",
      keywords: [
        ["judas"],
        ["kiss"],
        ["betraying", "betray"],
        ["son of man"]
      ]
    },
    {
      q: "What change happened to Peter when Jesus looked at him after he had denied Jesus thrice?",
      model: "Peter remembered the word of the Lord, how he had said to him, 'Before the cock crows today, you will deny me three times.' And he went out and wept bitterly.",
      keywords: [
        ["remembered", "remember"],
        ["word", "lord", "jesus"],
        ["cock", "crow", "crows", "rooster"],
        ["deny", "denied", "denial", "three"],
        ["wept", "weep", "cried"],
        ["bitterly", "bitter"]
      ]
    }
  ],

  three: [
    {
      q: "Describe in your own words what happened during Peter's denial of Jesus.",
      model: "Peter followed Jesus from a distance to the house of the chief priest and sat by a fire in the courtyard. A servant girl, then another person, and finally a third insisted he was with Jesus. Each time Peter denied it — saying 'Woman, I do not know him,' 'Man, I am not!' and 'Man, I do not know what you are talking about!' At that moment the cock crowed, and the Lord turned and looked at Peter. He remembered Jesus' words that he would deny him three times before the cock crows, and he went out and wept bitterly.",
      keywords: [
        ["peter"],
        ["fire", "courtyard"],
        ["servant girl", "servant", "girl"],
        ["denied", "deny", "do not know"],
        ["three", "thrice", "3"],
        ["cock", "rooster"],
        ["wept", "cried", "weep"]
      ]
    },

// ===== HELPERS =====
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr, n) {
  return shuffle(arr).slice(0, n);
}

function normalize(str) {
  return (str || "")
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

// Check if a keyword phrase appears in the normalized answer.
function containsTerm(normalizedAnswer, term) {
  const t = normalize(term);
  if (!t) return false;
  // word boundary check using padded spaces
  return (" " + normalizedAnswer + " ").includes(" " + t + " ")
      || normalizedAnswer.includes(t); // fallback substring for multi-word
}

// Returns {hits, total, hitConcepts, missConcepts}
function scoreAnswer(userAnswer, keywordGroups) {
  const norm = normalize(userAnswer);
  const hitConcepts = [];
  const missConcepts = [];
  for (const group of keywordGroups) {
    const found = group.some(term => containsTerm(norm, term));
    if (found) hitConcepts.push(group[0]);
    else missConcepts.push(group[0]);
  }
  return {
    hits: hitConcepts.length,
    total: keywordGroups.length,
    hitConcepts, missConcepts
  };
}

function computeMarks(score, maxMarks) {
  if (score.total === 0) return maxMarks;
  const ratio = score.hits / score.total;
  // Convert coverage ratio to marks out of maxMarks. Round to nearest 0.5.
  const raw = ratio * maxMarks;
  return Math.round(raw * 2) / 2;
}

function verdictFor(score) {
  if (score.total === 0) return "good";
  const r = score.hits / score.total;
  if (r >= 0.8) return "good";
  if (r >= 0.4) return "partial";
  return "bad";
}

function verdictLabel(v) {
  return v === "good" ? "Well answered" : v === "partial" ? "Partially correct" : "Needs work";
}

// ===== AVAILABILITY HELPERS =====
function bankHasQuestions(bank) {
  if (!bank) return false;
  return (bank.one && bank.one.length > 0)
      || (bank.two && bank.two.length > 0)
      || (bank.three && bank.three.length > 0);
}

function getGKBanksForYear(year) {
  return QUIZ_DATA.generalKnowledge.filter(g =>
    year >= g.yearRange[0] && year <= g.yearRange[1] && bankHasQuestions(g.bank)
  );
}

function getPrayersForYear(year) {
  return QUIZ_DATA.prayers.filter(p =>
    year >= p.yearRange[0] && year <= p.yearRange[1]
  );
}

function getAvailableChaptersForYear(year) {
  const yearData = QUIZ_DATA.chapters[year] || {};
  const out = {};
  for (let ch = 1; ch <= TOTAL_CHAPTERS; ch++) {
    const entry = yearData[ch];
    if (entry && bankHasQuestions(entry.bank)) {
      out[ch] = entry;
    }
  }
  return out;
}

function exitApp() {
  // iOS standalone PWAs cannot be programmatically closed. Try window.close()
  // (works in some contexts) and fall back to clear instructions.
  let closed = false;
  try { window.close(); closed = true; } catch (e) {}
  setTimeout(() => {
    if (!document.hidden) {
      alert(
        "To close the app:\n\n" +
        "iPhone — swipe up from the bottom of the screen and flick the app away.\n\n" +
        "Android — tap the recent apps button (or swipe up and hold) then swipe the app away.\n\n" +
        "(Browsers don't let web apps close themselves on iOS.)"
      );
    }
  }, 200);
}

function hasUnsavedQuizAnswers() {
  const quizScreen = document.getElementById("quiz-screen");
  if (!quizScreen || quizScreen.classList.contains("hidden")) return false;
  if (!currentQuiz) return false;
  for (let i = 0; i < currentQuiz.length; i++) {
    const ta = document.getElementById("ans-" + i);
    if (ta && ta.value.trim().length > 0) return true;
  }
  return false;
}

function confirmLeaveQuiz() {
  if (!hasUnsavedQuizAnswers()) return true;
  return confirm("Leave this quiz? Your typed answers will be lost.");
}

function backFromQuiz() {
  if (!confirmLeaveQuiz()) return;
  if (selectedCategory === "chapters") {
    renderChapterScreen();
  } else if (selectedCategory === "prayers") {
    renderPrayersScreen();
  } else {
    renderCategoryScreen();
  }
}

function selectCategory(cat) {
  selectedCategory = cat;
  if (cat === "chapters") {
    renderChapterScreen();
    return;
  }
  if (cat === "gk") {
    const banks = getGKBanksForYear(selectedYear);
    if (banks.length >= 1) {
      // Future: if banks.length > 1, show a sub-picker. For now, take the first.
      selectedBankSource = {
        label: banks[0].name || "General Knowledge",
        bank: banks[0].bank,
        pattern: banks[0].pattern
      };
      startQuiz();
    }
    return;
  }
  if (cat === "prayers") {
    renderPrayersScreen();
    return;
  }
}

  const info = document.getElementById("mock-info");

  if (count === 0) {
    info.textContent = "No prayers available";
  } else if (count < 3) {
    info.textContent = `${count} prayer${count > 1 ? "s" : ""} × 3 marks each`;
  } else {
    info.textContent = "3 random × 3 marks each";

  window.scrollTo({top: 0, behavior: 'smooth'});

function togglePrayerList() {
  const container = document.getElementById("prayer-list-container");
  const caret = document.querySelector("#prayer-list-toggle .caret");
  const expanded = !container.classList.contains("hidden");
  if (expanded) {
    container.classList.add("hidden");
    caret.innerHTML = "&#9656;";
  } else {
    container.classList.remove("hidden");
    caret.innerHTML = "&#9662;";
  }
}

function togglePrayerText(i) {
  const text = document.getElementById("prayer-text-" + i);
  const caret = document.getElementById("prayer-caret-" + i);
  if (text.classList.contains("hidden")) {
    text.classList.remove("hidden");
    caret.innerHTML = "&#9662;";
  } else {
    text.classList.add("hidden");
    caret.innerHTML = "&#9656;";
  }
}

  // Each prayer becomes a 3-mark question. startQuiz handles the random pick.
  const questions = prayers.map(p => ({
    q: p.quizQuestion,
    model: p.text,
    keywords: p.keywords
  }));

  const wantedThree = Math.min(3, questions.length);
  selectedCategory = "prayers";
  selectedBankSource = {
    label: `Year ${selectedYear} · Prayers Mock Test`,
    bank: { one: [], two: [], three: questions },
    pattern: { one: 0, two: 0, three: wantedThree }
  };
  startQuiz();
}

// ===== QUIZ FLOW =====
const DEFAULT_PATTERN = { one: 3, two: 1, three: 1 };

function startQuiz() {
  if (!selectedBankSource) return;
  const bank = selectedBankSource.bank;
  const pattern = selectedBankSource.pattern || DEFAULT_PATTERN;
  const nOne   = pattern.one   || 0;
  const nTwo   = pattern.two   || 0;
  const nThree = pattern.three || 0;
  const ones   = pickRandom(bank.one   || [], Math.min(nOne,   (bank.one   || []).length))
                   .map(q => ({...q, marks: 1, type: "one"}));
  const twos   = pickRandom(bank.two   || [], Math.min(nTwo,   (bank.two   || []).length))
                   .map(q => ({...q, marks: 2, type: "two"}));
  const threes = pickRandom(bank.three || [], Math.min(nThree, (bank.three || []).length))
                   .map(q => ({...q, marks: 3, type: "three"}));
  currentQuiz = [...ones, ...twos, ...threes];
  renderQuiz();
}

function renderQuiz() {
  hideAllScreens();
  const screen = document.getElementById("quiz-screen");
  screen.classList.remove("hidden");
  setSubtitle(selectedBankSource ? selectedBankSource.label : "Quiz");

  const backLabel = selectedCategory === "chapters" ? "Chapters"
                   : selectedCategory === "prayers" ? "Prayers"
                   : "Categories";
  const numQs = currentQuiz.length;
  const totalMarks = currentQuiz.reduce((s, q) => s + q.marks, 0);

  let html = `<div class="card">
    <div class="nav-bar">
      <button class="back-link" onclick="backFromQuiz()">&larr; ${backLabel}</button>
      <button class="home-link" onclick="goHome()">&#8962; Home</button>
    </div>
    <div class="breadcrumb">${escapeHtml(selectedBankSource ? selectedBankSource.label : "")}</div>
    <h2 style="color:var(--primary); margin-top:0;">Quick Test — ${numQs} Question${numQs === 1 ? "" : "s"} (Total ${totalMarks} mark${totalMarks === 1 ? "" : "s"})</h2>
    <p style="color:var(--muted); font-size:14px;">Answer all the questions below. You can be brief — what matters is including the key facts and names.</p>
  </div>`;

  currentQuiz.forEach((q, i) => {
    const cls = q.marks === 3 ? "three-mark" : q.marks === 2 ? "two-mark" : "";
    html += `
      <div class="card">
        <div class="question">
          <div class="q-header">
            <span class="q-number">Question ${i+1}</span>
            <span class="q-marks">${q.marks} mark${q.marks > 1 ? "s" : ""}</span>
          </div>
          <div class="q-text">${q.q}</div>
          <label class="small" for="ans-${i}">Your answer:</label>
          <textarea id="ans-${i}" class="${cls}" placeholder="Type your answer here..."></textarea>
        </div>
      </div>`;
  });

  html += `
    <div class="actions">
      <button onclick="submitQuiz()">Submit Answers</button>
      <button class="secondary" onclick="if(confirm('Start a new random test? Your current answers will be lost.')) startQuiz();">Get New Questions</button>
    </div>`;

  screen.innerHTML = html;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function submitQuiz() {
  const results = currentQuiz.map((q, i) => {
    const userAnswer = document.getElementById("ans-" + i).value.trim();
    const score = scoreAnswer(userAnswer, q.keywords);
    const marks = userAnswer.length === 0 ? 0 : computeMarks(score, q.marks);
    const verdict = userAnswer.length === 0 ? "bad" : verdictFor(score);
    return { q, userAnswer, score, marks, verdict };
  });

  renderResults(results);
}

function renderResults(results) {
  hideAllScreens();
  const screen = document.getElementById("result-screen");
  screen.classList.remove("hidden");
  setSubtitle("Your results");

  const totalMarks = results.reduce((s, r) => s + r.marks, 0);
  const maxMarks   = results.reduce((s, r) => s + r.q.marks, 0);
  const pct = Math.round((totalMarks / maxMarks) * 100);

  const resBackFn = selectedCategory === 'chapters' ? 'renderChapterScreen()'
                  : selectedCategory === 'prayers'  ? 'renderPrayersScreen()'
                  : 'renderCategoryScreen()';
  const resBackLabel = selectedCategory === 'chapters' ? 'Chapters'
                     : selectedCategory === 'prayers'  ? 'Prayers'
                     : 'Categories';
  let html = `
    <div class="card">
      <div class="nav-bar">
        <button class="back-link" onclick="${resBackFn}">&larr; ${resBackLabel}</button>
        <button class="home-link" onclick="goHome()">&#8962; Home</button>
      </div>
      <div class="breadcrumb">${escapeHtml(selectedBankSource ? selectedBankSource.label : "")}</div>
      <div class="score-summary">
        <div style="font-size:14px; color:var(--muted); text-transform:uppercase; letter-spacing:1px;">Your Score</div>
        <div class="big">${totalMarks} / ${maxMarks}</div>
        <div style="color:var(--secondary); font-weight:bold;">${pct}%</div>
      </div>
    </div>`;

  results.forEach((r, i) => {
    const v = r.verdict;
    html += `
      <div class="card">
        <div class="question result-question ${v}">
          <div class="q-header">
            <span class="q-number">Question ${i+1} <span style="color:var(--muted); font-weight:normal;">(${r.q.marks} mark${r.q.marks > 1 ? "s" : ""})</span></span>
            <span>
              <span class="verdict ${v}">${verdictLabel(v)}</span>
              &nbsp;<strong>${r.marks} / ${r.q.marks}</strong>
            </span>
          </div>
          <div class="q-text">${r.q.q}</div>

          <div class="result-block your-answer">
            <strong>Your answer:</strong><br>
            ${r.userAnswer ? escapeHtml(r.userAnswer) : "<em style='color:var(--muted)'>(no answer given)</em>"}
          </div>

          <div class="result-block model-answer">
            <strong>Expected answer:</strong><br>
            ${escapeHtml(r.q.model)}
          </div>

          ${renderKeywords(r)}
        </div>
      </div>`;
  });

  const pickAnotherLabel = selectedCategory === 'chapters' ? 'Pick Another Chapter'
                         : selectedCategory === 'prayers'  ? 'Back to Prayers'
                         : 'Change Category';
  const pickAnotherFn    = selectedCategory === 'chapters' ? 'renderChapterScreen()'
                         : selectedCategory === 'prayers'  ? 'renderPrayersScreen()'
                         : 'renderCategoryScreen()';
  html += `
    <div class="actions">
      <button onclick="startQuiz()">Try Another Quiz</button>
      <button class="secondary" onclick="${pickAnotherFn}">${pickAnotherLabel}</button>
      <button class="secondary" onclick="goHome()">&#8962; Home</button>
    </div>`;

  screen.innerHTML = html;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderKeywords(r) {
  if (r.score.total === 0) return "";
  let html = `<div class="keywords"><strong>Key points coverage (${r.score.hits}/${r.score.total}):</strong><br>`;
  r.score.hitConcepts.forEach(k => html += `<span class="kw hit">&#10003; ${escapeHtml(k)}</span>`);
  r.score.missConcepts.forEach(k => html += `<span class="kw miss">&#10007; ${escapeHtml(k)}</span>`);
  html += `</div>`;
  return html;
}

function backToStart() {
  renderYearScreen();
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

// Initialize year selection grid on first paint
renderYearScreen();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
