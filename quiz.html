      q: "When do we commemorate the passion and death of Jesus in the Holy Qurbana (Holy Mass)?",
      model: "During the Holy Qurbana (Holy Mass), when the priest approaches the centre of the altar with the host and wine in the chalice and cup, it reminds us of the journey of Jesus to Calvary. During the prayer that follows, the priest holds his hands like a cross, which reminds us of the crucifixion of Jesus. Whenever we participate in the Holy Mass, we should prayerfully thank Jesus who died for us.",
      keywords: [
        ["holy qurbana", "qurbana", "holy mass", "mass"],
        ["priest"],
        ["centre", "center", "altar"],
        ["host", "wine", "chalice", "cup"],
        ["journey", "calvary"],
        ["hands", "hand"],
        ["cross", "crucifixion", "crucified"]
      ]
    }
  ]
};

// ===== QUIZ DATA STRUCTURE =====
// Organizes question banks by Year Group + Category.
// As new content is added, populate the matching slot here — the UI
// automatically enables the corresponding buttons.

const QUIZ_DATA = {
  // General Knowledge — array of banks, each covers a year range.
  // Years outside any bank's range see GK as disabled.
  generalKnowledge: [
    // Placeholder for "General Knowledge years 4 to 7" — to be populated when
    // the source file is shared. Leave bank empty for now so the UI grays it out.
    // {
    //   name: "General Knowledge (Years 4–7)",
    //   yearRange: [4, 7],
    //   bank: { one: [], two: [], three: [] }
    // }
  ],

  // Prayers — array of banks, each with a year range derived from the file title
  // (e.g. "Prayers 1 (Years 1 - 3)" → yearRange: [1, 3]). Multiple banks may
  // match a single year; if so, the user picks which one.
  prayers: [
    // To be populated from "Prayers 1" through "Prayers 4" files.
  ],

  // Chapters — keyed by year, then by chapter number (1–15).
  // Each entry: { title, bank }. Only populated chapters are clickable.
  chapters: {
    6: {
      8: {
        title: "Jesus Who Died For Us",
        bank: QUESTION_BANK
      }
    }
    // Other years/chapters will be added as content is created.
  }
};

const TOTAL_CHAPTERS = 15;
const CHAPTER_TITLES = {
  // Friendly titles shown on the chapter grid where known.
  // Add more as chapters are populated.
  "6-8": "Jesus Who Died For Us"
};

// ===== STATE =====
let currentQuiz = null;
let selectedYear = null;
let selectedCategory = null;
let selectedBankSource = null; // { label: "...", bank: { one, two, three } }

// ===== HELPERS =====
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr, n) {
  return shuffle(arr).slice(0, n);
}

function normalize(str) {
  return (str || "")
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

// Check if a keyword phrase appears in the normalized answer.
function containsTerm(normalizedAnswer, term) {
  const t = normalize(term);
  if (!t) return false;
  // word boundary check using padded spaces
  return (" " + normalizedAnswer + " ").includes(" " + t + " ")
      || normalizedAnswer.includes(t); // fallback substring for multi-word
}

// Returns {hits, total, hitConcepts, missConcepts}
function scoreAnswer(userAnswer, keywordGroups) {
  const norm = normalize(userAnswer);
  const hitConcepts = [];
  const missConcepts = [];
  for (const group of keywordGroups) {
    const found = group.some(term => containsTerm(norm, term));
    if (found) hitConcepts.push(group[0]);
    else missConcepts.push(group[0]);
  }
  return {
    hits: hitConcepts.length,
    total: keywordGroups.length,
    hitConcepts, missConcepts
  };
}

function computeMarks(score, maxMarks) {
  if (score.total === 0) return maxMarks;
  const ratio = score.hits / score.total;
  // Convert coverage ratio to marks out of maxMarks. Round to nearest 0.5.
  const raw = ratio * maxMarks;
  return Math.round(raw * 2) / 2;
}

function verdictFor(score) {
  if (score.total === 0) return "good";
  const r = score.hits / score.total;
  if (r >= 0.8) return "good";
  if (r >= 0.4) return "partial";
  return "bad";
}

function verdictLabel(v) {
  return v === "good" ? "Well answered" : v === "partial" ? "Partially correct" : "Needs work";
}

// ===== AVAILABILITY HELPERS =====
function bankHasQuestions(bank) {
  if (!bank) return false;
  return (bank.one && bank.one.length > 0)
      || (bank.two && bank.two.length > 0)
      || (bank.three && bank.three.length > 0);
}

function getGKBanksForYear(year) {
  return QUIZ_DATA.generalKnowledge.filter(g =>
    year >= g.yearRange[0] && year <= g.yearRange[1] && bankHasQuestions(g.bank)
  );
}

function getPrayerBanksForYear(year) {
  return QUIZ_DATA.prayers.filter(p =>
    year >= p.yearRange[0] && year <= p.yearRange[1] && bankHasQuestions(p.bank)
  );
}

function getAvailableChaptersForYear(year) {
  const yearData = QUIZ_DATA.chapters[year] || {};
  const out = {};
  for (let ch = 1; ch <= TOTAL_CHAPTERS; ch++) {
    const entry = yearData[ch];
    if (entry && bankHasQuestions(entry.bank)) {
      out[ch] = entry;
    }
  }
  return out;
}

// ===== SCREEN NAVIGATION =====
function hideAllScreens() {
  ["start-screen", "category-screen", "chapter-screen", "quiz-screen", "result-screen"]
    .forEach(id => document.getElementById(id).classList.add("hidden"));
}

function setSubtitle(text) {
  document.getElementById("header-subtitle").textContent = text;
}

function renderYearScreen() {
  hideAllScreens();
  document.getElementById("start-screen").classList.remove("hidden");
  selectedYear = null;
  selectedCategory = null;
  selectedBankSource = null;
  setSubtitle("Pick your year group to begin");

  const grid = document.getElementById("year-grid");
  let html = "";
  for (let y = 1; y <= 12; y++) {
    html += `
      <button class="year-btn" onclick="selectYear(${y})">
        <span class="year-num">${y}</span>
        <span class="year-label">Year</span>
      </button>`;
  }
  grid.innerHTML = html;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function selectYear(year) {
  selectedYear = year;
  renderCategoryScreen();
}

function goToYearScreen() {
  renderYearScreen();
}

function renderCategoryScreen() {
  hideAllScreens();
  document.getElementById("category-screen").classList.remove("hidden");
  setSubtitle(`Year ${selectedYear} — pick a category`);
  document.getElementById("category-breadcrumb").textContent =
    `Year ${selectedYear}  ›  Category`;

  const gkBanks = getGKBanksForYear(selectedYear);
  const prayerBanks = getPrayerBanksForYear(selectedYear);
  const chapters = getAvailableChaptersForYear(selectedYear);

  const cats = [
    {
      key: "gk",
      title: "General Knowledge",
      desc: gkBanks.length
        ? `${gkBanks.length} question set${gkBanks.length > 1 ? "s" : ""} available.`
        : "Not yet available for this year.",
      enabled: gkBanks.length > 0,
      badge: gkBanks.length ? "" : (selectedYear >= 4 && selectedYear <= 7 ? "Coming soon" : "Not for this year")
    },
    {
      key: "prayers",
      title: "Prayers",
      desc: prayerBanks.length
        ? `${prayerBanks.length} prayer set${prayerBanks.length > 1 ? "s" : ""} available.`
        : "Not yet available for this year.",
      enabled: prayerBanks.length > 0,
      badge: prayerBanks.length ? "" : "Coming soon"
    },
    {
      key: "chapters",
      title: "Chapters",
      desc: Object.keys(chapters).length
        ? `${Object.keys(chapters).length} of ${TOTAL_CHAPTERS} chapters available.`
        : "No chapters added yet for this year.",
      enabled: Object.keys(chapters).length > 0,
      badge: Object.keys(chapters).length ? "" : "Coming soon"
    },
    {
      key: "mock",
      title: "Mock Test",
      desc: "Combined random test across the whole year. Available once all chapters are added.",
      enabled: false,
      badge: "Coming soon"
    }
  ];

  let html = "";
  cats.forEach(c => {
    const disabledCls = c.enabled ? "" : "disabled";
    const onClick = c.enabled ? `onclick="selectCategory('${c.key}')"` : "";
    const badgeCls = c.key === "mock" ? "soon" : "locked";
    const badgeHtml = c.badge ? `<span class="badge ${badgeCls}">${c.badge}</span>` : "";
    html += `
      <button class="category-card ${disabledCls}" ${onClick} ${c.enabled ? "" : "disabled"}>
        <h3>${c.title}${badgeHtml}</h3>
        <p>${c.desc}</p>
      </button>`;
  });
  document.getElementById("category-grid").innerHTML = html;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function goToCategoryScreen() {
  if (!confirmLeaveQuiz()) return;
  renderCategoryScreen();
}

function goHome() {
  if (!confirmLeaveQuiz()) return;
  renderYearScreen();
}

function hasUnsavedQuizAnswers() {
  const quizScreen = document.getElementById("quiz-screen");
  if (!quizScreen || quizScreen.classList.contains("hidden")) return false;
  if (!currentQuiz) return false;
  for (let i = 0; i < currentQuiz.length; i++) {
    const ta = document.getElementById("ans-" + i);
    if (ta && ta.value.trim().length > 0) return true;
  }
  return false;
}

function confirmLeaveQuiz() {
  if (!hasUnsavedQuizAnswers()) return true;
  return confirm("Leave this quiz? Your typed answers will be lost.");
}

function backFromQuiz() {
  if (!confirmLeaveQuiz()) return;
  if (selectedCategory === "chapters") {
    renderChapterScreen();
  } else {
    renderCategoryScreen();
  }
}

function selectCategory(cat) {
  selectedCategory = cat;
  if (cat === "chapters") {
    renderChapterScreen();
    return;
  }
  if (cat === "gk") {
    const banks = getGKBanksForYear(selectedYear);
    if (banks.length === 1) {
      selectedBankSource = { label: banks[0].name || "General Knowledge", bank: banks[0].bank };
      startQuiz();
    } else if (banks.length > 1) {
      // Future: a sub-picker. For now, just take the first.
      selectedBankSource = { label: banks[0].name || "General Knowledge", bank: banks[0].bank };
      startQuiz();
    }
    return;
  }
  if (cat === "prayers") {
    const banks = getPrayerBanksForYear(selectedYear);
    if (banks.length === 1) {
      selectedBankSource = { label: banks[0].name || "Prayers", bank: banks[0].bank };
      startQuiz();
    } else if (banks.length > 1) {
      selectedBankSource = { label: banks[0].name || "Prayers", bank: banks[0].bank };
      startQuiz();
    }
    return;
  }
}

function renderChapterScreen() {
  hideAllScreens();
  document.getElementById("chapter-screen").classList.remove("hidden");
  setSubtitle(`Year ${selectedYear} — pick a chapter`);
  document.getElementById("chapter-breadcrumb").textContent =
    `Year ${selectedYear}  ›  Chapters`;

  const available = getAvailableChaptersForYear(selectedYear);

  let html = "";
  for (let ch = 1; ch <= TOTAL_CHAPTERS; ch++) {
    const entry = available[ch];
    if (entry) {
      const title = entry.title || CHAPTER_TITLES[`${selectedYear}-${ch}`] || "";
      html += `
        <button class="chapter-btn" onclick="selectChapter(${ch})">
          <span class="ch-num">Ch. ${ch}</span>
          <span class="ch-title">${escapeHtml(title)}</span>
        </button>`;
    } else {
      html += `
        <button class="chapter-btn disabled" disabled title="Not yet available">
          <span class="ch-num">Ch. ${ch}</span>
          <span class="ch-title" style="opacity:0.6;">Coming soon</span>
        </button>`;
    }
  }
  document.getElementById("chapter-grid").innerHTML = html;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function selectChapter(ch) {
  const entry = QUIZ_DATA.chapters[selectedYear][ch];
  selectedBankSource = {
    label: `Year ${selectedYear} · Chapter ${ch} — ${entry.title}`,
    bank: entry.bank
  };
  startQuiz();
}

// ===== QUIZ FLOW =====
function startQuiz() {
  if (!selectedBankSource) return;
  const bank = selectedBankSource.bank;
  const ones   = pickRandom(bank.one   || [], Math.min(3, (bank.one   || []).length))
                   .map(q => ({...q, marks: 1, type: "one"}));
  const twos   = pickRandom(bank.two   || [], Math.min(1, (bank.two   || []).length))
                   .map(q => ({...q, marks: 2, type: "two"}));
  const threes = pickRandom(bank.three || [], Math.min(1, (bank.three || []).length))
                   .map(q => ({...q, marks: 3, type: "three"}));
  currentQuiz = [...ones, ...twos, ...threes];
  renderQuiz();
}

function renderQuiz() {
  hideAllScreens();
  const screen = document.getElementById("quiz-screen");
  screen.classList.remove("hidden");
  setSubtitle(selectedBankSource ? selectedBankSource.label : "Quiz");

  const backLabel = selectedCategory === "chapters" ? "Chapters" : "Categories";

  let html = `<div class="card">
    <div class="nav-bar">
      <button class="back-link" onclick="backFromQuiz()">&larr; ${backLabel}</button>
      <button class="home-link" onclick="goHome()">&#8962; Home</button>
    </div>
    <div class="breadcrumb">${escapeHtml(selectedBankSource ? selectedBankSource.label : "")}</div>
    <h2 style="color:var(--primary); margin-top:0;">Quick Test — 5 Questions (Total 8 marks)</h2>
    <p style="color:var(--muted); font-size:14px;">Answer all five questions below. You can be brief — what matters is including the key facts and names from the chapter.</p>
  </div>`;

  currentQuiz.forEach((q, i) => {
    const cls = q.marks === 3 ? "three-mark" : q.marks === 2 ? "two-mark" : "";
    html += `
      <div class="card">
        <div class="question">
          <div class="q-header">
            <span class="q-number">Question ${i+1}</span>
            <span class="q-marks">${q.marks} mark${q.marks > 1 ? "s" : ""}</span>
          </div>
          <div class="q-text">${q.q}</div>
          <label class="small" for="ans-${i}">Your answer:</label>
          <textarea id="ans-${i}" class="${cls}" placeholder="Type your answer here..."></textarea>
        </div>
      </div>`;
  });

  html += `
    <div class="actions">
      <button onclick="submitQuiz()">Submit Answers</button>
      <button class="secondary" onclick="if(confirm('Start a new random test? Your current answers will be lost.')) startQuiz();">Get New Questions</button>
    </div>`;

  screen.innerHTML = html;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function submitQuiz() {
  const results = currentQuiz.map((q, i) => {
    const userAnswer = document.getElementById("ans-" + i).value.trim();
    const score = scoreAnswer(userAnswer, q.keywords);
    const marks = userAnswer.length === 0 ? 0 : computeMarks(score, q.marks);
    const verdict = userAnswer.length === 0 ? "bad" : verdictFor(score);
    return { q, userAnswer, score, marks, verdict };
  });

  renderResults(results);
}

function renderResults(results) {
  hideAllScreens();
  const screen = document.getElementById("result-screen");
  screen.classList.remove("hidden");
  setSubtitle("Your results");

  const totalMarks = results.reduce((s, r) => s + r.marks, 0);
  const maxMarks   = results.reduce((s, r) => s + r.q.marks, 0);
  const pct = Math.round((totalMarks / maxMarks) * 100);

  let html = `
    <div class="card">
      <div class="nav-bar">
        <button class="back-link" onclick="${selectedCategory === 'chapters' ? 'renderChapterScreen()' : 'renderCategoryScreen()'}">&larr; ${selectedCategory === 'chapters' ? 'Chapters' : 'Categories'}</button>
        <button class="home-link" onclick="goHome()">&#8962; Home</button>
      </div>
      <div class="breadcrumb">${escapeHtml(selectedBankSource ? selectedBankSource.label : "")}</div>
      <div class="score-summary">
        <div style="font-size:14px; color:var(--muted); text-transform:uppercase; letter-spacing:1px;">Your Score</div>
        <div class="big">${totalMarks} / ${maxMarks}</div>
        <div style="color:var(--secondary); font-weight:bold;">${pct}%</div>
      </div>
    </div>`;

  results.forEach((r, i) => {
    const v = r.verdict;
    html += `
      <div class="card">
        <div class="question result-question ${v}">
          <div class="q-header">
            <span class="q-number">Question ${i+1} <span style="color:var(--muted); font-weight:normal;">(${r.q.marks} mark${r.q.marks > 1 ? "s" : ""})</span></span>
            <span>
              <span class="verdict ${v}">${verdictLabel(v)}</span>
              &nbsp;<strong>${r.marks} / ${r.q.marks}</strong>
            </span>
          </div>
          <div class="q-text">${r.q.q}</div>

          <div class="result-block your-answer">
            <strong>Your answer:</strong><br>
            ${r.userAnswer ? escapeHtml(r.userAnswer) : "<em style='color:var(--muted)'>(no answer given)</em>"}
          </div>

          <div class="result-block model-answer">
            <strong>Expected answer:</strong><br>
            ${escapeHtml(r.q.model)}
          </div>

          ${renderKeywords(r)}
        </div>
      </div>`;
  });

  const pickAnotherLabel = selectedCategory === 'chapters' ? 'Pick Another Chapter' : 'Change Category';
  const pickAnotherFn    = selectedCategory === 'chapters' ? 'renderChapterScreen()' : 'renderCategoryScreen()';
  html += `
    <div class="actions">
      <button onclick="startQuiz()">Try Another Quiz</button>
      <button class="secondary" onclick="${pickAnotherFn}">${pickAnotherLabel}</button>
      <button class="secondary" onclick="goHome()">&#8962; Home</button>
    </div>`;

  screen.innerHTML = html;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderKeywords(r) {
  if (r.score.total === 0) return "";
  let html = `<div class="keywords"><strong>Key points coverage (${r.score.hits}/${r.score.total}):</strong><br>`;
  r.score.hitConcepts.forEach(k => html += `<span class="kw hit">&#10003; ${escapeHtml(k)}</span>`);
  r.score.missConcepts.forEach(k => html += `<span class="kw miss">&#10007; ${escapeHtml(k)}</span>`);
  html += `</div>`;
  return html;
}

function backToStart() {
  renderYearScreen();
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

// Initialize year selection grid on first paint
renderYearScreen();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
